version = 0.1

[default.global.parameters]
stack_name = "sam-app"
region = "eu-west-2"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
s3_prefix = "sam-container"
disable_rollback = true
image_repositories = ["Function1=348345791015.dkr.ecr.eu-west-2.amazonaws.com/samapp7427b055/function180815219repo", "Function2=348345791015.dkr.ecr.eu-west-2.amazonaws.com/samapp7427b055/function266860bebrepo"]
stack_name = "sam-container"

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"
